name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Workspace libs expose their types from dist/*.d.ts, so the apps that
      # import @magpie/core and @magpie/db can only typecheck once those are
      # built. Emit them before typecheck (the later Build step is idempotent).
      - name: Build workspace packages
        run: pnpm --filter "./packages/*" build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test
